# mdview.conf — default configuration for mdview
# Sourced as Bash key=value pairs. Only MDVIEW_* variables are used.

# Theme name (resolves to <name>.css + <name>.theme in themes/ directory)
MDVIEW_THEME=github-dark

# Browser window dimensions (WIDTHxHEIGHT)
MDVIEW_WINDOW_SIZE=960x1080

# Browser override (empty = auto-detect: google-chrome -> chromium-browser -> chromium -> xdg-open)
#MDVIEW_BROWSER=
